name: GraphMigrate CI

on:
  push:
    branches:
      - master
      - "feature/**"
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — preview without applying"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

env:
  GO_VERSION: "1.22"
  NEO4J_URI: "bolt://localhost:7687"
  NEO4J_USERNAME: "neo4j"
  NEO4J_PASSWORD: "migration"
  NEO4J_DATABASE: "neo4j"
  MIGRATIONS_DIR: "./migrations"
  # Direct download URL for the baseline dump zip from GitHub Release
  DUMP_URL: "https://github.com/Shriya0-4/Neo4j-migration-tool/releases/download/v0-baseline/recommendations-50.zip"
  # The actual .dump filename inside the zip
  DUMP_FILENAME: "recommendations-50.dump"

jobs:
  # ────────────────────────────────────────────────────────
  # JOB 1: lint + unit tests (no Neo4j needed)
  # ────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./internal/loader/... -v -count=1

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

  # ────────────────────────────────────────────────────────
  # JOB 2: full migration pipeline
  # ────────────────────────────────────────────────────────
  migration-pipeline:
    name: Migration Pipeline
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Build graphmigrate binary
        run: |
          mkdir -p bin
          go build -o bin/graphmigrate .
          echo "✓ binary built"

      # ── Step 1: Download dump zip from GitHub Release ──
      - name: Download baseline dump from GitHub Release
        run: |
          mkdir -p dumps
          echo "→ Downloading ${{ env.DUMP_URL }}..."
          curl -L \
            -H "Accept: application/octet-stream" \
            "${{ env.DUMP_URL }}" \
            -o dumps/recommendations-50.zip
          echo "✓ Downloaded: $(du -sh dumps/recommendations-50.zip | cut -f1)"

      - name: Unzip dump
        run: |
          cd dumps
          unzip -o recommendations-50.zip
          echo "✓ Contents after unzip:"
          ls -lh

      - name: Verify dump file exists
        run: |
          if [ ! -f "dumps/${{ env.DUMP_FILENAME }}" ]; then
            echo "ERROR: Expected dumps/${{ env.DUMP_FILENAME }} but not found."
            echo "Files in dumps/:"
            ls -lh dumps/
            exit 1
          fi
          echo "✓ Dump file verified: dumps/${{ env.DUMP_FILENAME }} ($(du -sh dumps/${{ env.DUMP_FILENAME }} | cut -f1))"

      # ── Step 2: Start Neo4j ────────────────────────────
      - name: Start Neo4j Docker container
        run: |
          docker run -d \
            --name neo4j \
            -p 7474:7474 \
            -p 7687:7687 \
            -e NEO4J_AUTH=${{ env.NEO4J_USERNAME }}/${{ env.NEO4J_PASSWORD }} \
            -e NEO4J_server_memory_heap_initial__size=512m \
            -e NEO4J_server_memory_heap_max__size=1g \
            -v ${{ github.workspace }}/dumps:/dumps \
            neo4j:5.18.0-community
          echo "✓ Neo4j container started"

      - name: Wait for Neo4j HTTP to be ready
        run: |
          echo "Waiting for Neo4j..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:7474 > /dev/null 2>&1; then
              echo "✓ Neo4j ready (attempt $i)"
              break
            fi
            echo "  attempt $i/40 — waiting 3s..."
            sleep 3
          done

      # ── Step 3: Load dump ──────────────────────────────
      # neo4j-admin database load requires the database to be stopped.
      # We stop it, load the dump by exact filename, then restart.
      - name: Stop Neo4j database for dump load
        run: |
          docker exec neo4j neo4j stop || true
          sleep 5
          echo "✓ Neo4j stopped"

      - name: Load dump using neo4j-admin
        run: |
          docker exec neo4j neo4j-admin database load neo4j \
            --from-path=/dumps/${{ env.DUMP_FILENAME }} \
            --overwrite-destination=true
          echo "✓ Dump loaded successfully"

      - name: Restart Neo4j after dump load
        run: |
          docker exec neo4j neo4j start
          echo "Waiting for Neo4j to come back online..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:7474 > /dev/null 2>&1; then
              echo "✓ Neo4j back online (attempt $i)"
              break
            fi
            echo "  attempt $i/40 — waiting 3s..."
            sleep 3
          done

      # ── Step 4: Pre-migration snapshot ────────────────
      - name: Capture pre-migration snapshot
        run: |
          mkdir -p snapshots
          bash scripts/snapshot.sh pre-migration snapshots/pre_migration.txt
        env:
          NEO4J_URL: ${{ env.NEO4J_URI }}
          NEO4J_USERNAME: ${{ env.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ env.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ env.NEO4J_DATABASE }}

      # ── Step 5: Run migrations ─────────────────────────
      - name: Run all migrations
        id: run_migrations
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          ./bin/graphmigrate migrate --verbose $FLAGS 2>&1 | tee migration_output.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          NEO4J_URL: ${{ env.NEO4J_URI }}
          NEO4J_USERNAME: ${{ env.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ env.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ env.NEO4J_DATABASE }}
          MIGRATIONS_DIR: ${{ env.MIGRATIONS_DIR }}

      - name: Run migration status check
        if: always()
        run: |
          ./bin/graphmigrate status 2>&1 | tee migration_status.log
        env:
          NEO4J_URL: ${{ env.NEO4J_URI }}
          NEO4J_USERNAME: ${{ env.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ env.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ env.NEO4J_DATABASE }}
          MIGRATIONS_DIR: ${{ env.MIGRATIONS_DIR }}

      # ── Step 6: Post-migration snapshot ───────────────
      - name: Capture post-migration snapshot
        if: always()
        run: |
          bash scripts/snapshot.sh post-migration snapshots/post_migration.txt
        env:
          NEO4J_URL: ${{ env.NEO4J_URI }}
          NEO4J_USERNAME: ${{ env.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ env.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ env.NEO4J_DATABASE }}

      # ── Step 7: Export post-migration Cypher dump ─────
      - name: Export post-migration Cypher dump
        if: always()
        run: |
          bash scripts/export_cypher_dump.sh dumps/post_migration_dump.cypher
        env:
          NEO4J_URL: ${{ env.NEO4J_URI }}
          NEO4J_USERNAME: ${{ env.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ env.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ env.NEO4J_DATABASE }}

      # ── Step 8: Generate audit report ─────────────────
      - name: Generate migration report
        if: always()
        run: |
          bash scripts/generate_report.sh
        env:
          NEO4J_URL: ${{ env.NEO4J_URI }}
          NEO4J_USERNAME: ${{ env.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ env.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ env.NEO4J_DATABASE }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          ROLLBACK_TO: ""
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
          RUN_ID: ${{ github.run_id }}
          TRIGGERED_BY: ${{ github.actor }}

      # ── Step 9: Print report to job log ───────────────
      - name: Print report summary to job log
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "        MIGRATION REPORT SUMMARY"
          echo "════════════════════════════════════════"
          cat reports/migration_report_*.txt 2>/dev/null || echo "No report found"

      # ── Step 10: Store all artifacts (90 days) ────────
      - name: Upload migration report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: migration-report-${{ github.run_id }}
          path: reports/
          retention-days: 90

      - name: Upload baseline dump zip
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dump-baseline-${{ github.run_id }}
          path: dumps/recommendations-50.zip
          retention-days: 90

      - name: Upload post-migration Cypher dump
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dump-post-migration-${{ github.run_id }}
          path: dumps/post_migration_dump.cypher
          retention-days: 90

      - name: Upload snapshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: db-snapshots-${{ github.run_id }}
          path: snapshots/
          retention-days: 90

      - name: Upload migration logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: migration-logs-${{ github.run_id }}
          path: |
            migration_output.log
            migration_status.log
          retention-days: 90

      # ── Step 11: Fail if migration failed ─────────────
      - name: Fail job if migration failed
        if: steps.run_migrations.outputs.exit_code != '0'
        run: |
          echo "Migration failed with exit code ${{ steps.run_migrations.outputs.exit_code }}"
          exit 1