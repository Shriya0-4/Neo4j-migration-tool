name: GraphMigrate CI

on:
  push:
    branches:
      - main
      - master
      - "feature/**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — preview without applying"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

env:
  GO_VERSION: "1.22"
  NEO4J_URI: "bolt://localhost:7687"
  NEO4J_USERNAME: "neo4j"
  NEO4J_PASSWORD: "migration"
  NEO4J_DATABASE: "neo4j"
  MIGRATIONS_DIR: "./migrations"
  DUMP_URL: "https://github.com/Shriya0-4/Neo4j-migration-tool/releases/download/v0-baseline/recommendations-50.zip"
  DUMP_FILENAME: "recommendations-50.dump"

jobs:
  # ────────────────────────────────────────────────────────
  # JOB 1: lint + unit tests
  # ────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./cmd/internal/loader/... -v -count=1

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

  # ────────────────────────────────────────────────────────
  # JOB 2: full migration pipeline
  # ────────────────────────────────────────────────────────
  migration-pipeline:
    name: Migration Pipeline
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Build graphmigrate binary
        run: |
          mkdir -p bin
          go build -o bin/graphmigrate .
          echo "✓ binary built"

      # ── Step 1: Download and unzip dump ───────────────
      - name: Download baseline dump from GitHub Release
        run: |
          mkdir -p dumps
          wget --no-verbose \
            "${{ env.DUMP_URL }}" \
            -O dumps/recommendations-50.zip
          echo "✓ Downloaded: $(du -sh dumps/recommendations-50.zip | cut -f1)"
          file dumps/recommendations-50.zip

      - name: Unzip and prepare dump
        run: |
          cd dumps
          unzip -o recommendations-50.zip
          echo "✓ Contents after unzip:"
          ls -lh
          # neo4j-admin --from-path expects a DIRECTORY containing neo4j.dump
          # rename our dump file to neo4j.dump so neo4j-admin finds it
          if [ -f "${{ env.DUMP_FILENAME }}" ] && [ "${{ env.DUMP_FILENAME }}" != "neo4j.dump" ]; then
            cp "${{ env.DUMP_FILENAME }}" neo4j.dump
            echo "✓ Copied ${{ env.DUMP_FILENAME }} → neo4j.dump"
          fi
          ls -lh

      - name: Verify dump file
        run: |
          if [ ! -f "dumps/neo4j.dump" ]; then
            echo "ERROR: dumps/neo4j.dump not found"
            ls -lh dumps/
            exit 1
          fi
          echo "✓ neo4j.dump ready: $(du -sh dumps/neo4j.dump | cut -f1)"

      # ── Step 2: Load dump into Docker volume ──────────
      # Run neo4j-admin in a throwaway container BEFORE starting Neo4j.
      # --from-path takes a DIRECTORY — we pass /dumps where neo4j.dump lives.
      - name: Create Neo4j data volume
        run: docker volume create neo4j-data

      - name: Load dump into volume using neo4j-admin
        run: |
          docker run --rm \
            -v neo4j-data:/data \
            -v ${{ github.workspace }}/dumps:/dumps \
            neo4j:5.18.0-community \
            neo4j-admin database load neo4j \
              --from-path=/dumps \
              --overwrite-destination=true
          echo "✓ Dump loaded into volume"

      # ── Step 3: Start Neo4j with pre-loaded volume ────
      - name: Start Neo4j with pre-loaded data
        run: |
          docker run -d \
            --name neo4j \
            -p 7474:7474 \
            -p 7687:7687 \
            -v neo4j-data:/data \
            -e NEO4J_AUTH=${{ env.NEO4J_USERNAME }}/${{ env.NEO4J_PASSWORD }} \
            -e NEO4J_server_memory_heap_initial__size=512m \
            -e NEO4J_server_memory_heap_max__size=1g \
            neo4j:5.18.0-community
          echo "✓ Neo4j started"

      - name: Wait for Neo4j to be ready
        run: |
          echo "Waiting for Neo4j..."
          for i in $(seq 1 50); do
            if curl -sf http://localhost:7474 > /dev/null 2>&1; then
              echo "✓ Neo4j ready (attempt $i)"
              break
            fi
            echo "  attempt $i/50 — waiting 3s..."
            sleep 3
          done

      - name: Verify data loaded correctly
        run: |
          curl -sf -X POST http://localhost:7474/db/neo4j/tx/commit \
            -H "Content-Type: application/json" \
            -u "${{ env.NEO4J_USERNAME }}:${{ env.NEO4J_PASSWORD }}" \
            -d '{"statements":[{"statement":"MATCH (n) RETURN count(n) AS total"}]}' \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          total = data['results'][0]['data'][0]['row'][0]
          print(f'✓ {total} nodes loaded from dump')
          "

      # ── Step 4: Pre-migration snapshot ────────────────
      - name: Capture pre-migration snapshot
        run: |
          mkdir -p snapshots
          bash scripts/snapshot.sh pre-migration snapshots/pre_migration.txt
        env:
          NEO4J_URL: ${{ env.NEO4J_URI }}
          NEO4J_USERNAME: ${{ env.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ env.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ env.NEO4J_DATABASE }}

      # ── Step 5: Run migrations ─────────────────────────
      - name: Run all migrations
        id: run_migrations
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          ./bin/graphmigrate migrate --verbose $FLAGS 2>&1 | tee migration_output.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          NEO4J_URL: ${{ env.NEO4J_URI }}
          NEO4J_USERNAME: ${{ env.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ env.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ env.NEO4J_DATABASE }}
          MIGRATIONS_DIR: ${{ env.MIGRATIONS_DIR }}

      - name: Run migration status check
        if: always()
        run: |
          ./bin/graphmigrate status 2>&1 | tee migration_status.log
        env:
          NEO4J_URL: ${{ env.NEO4J_URI }}
          NEO4J_USERNAME: ${{ env.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ env.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ env.NEO4J_DATABASE }}
          MIGRATIONS_DIR: ${{ env.MIGRATIONS_DIR }}

      # ── Step 6: Post-migration snapshot ───────────────
      - name: Capture post-migration snapshot
        if: always()
        run: |
          bash scripts/snapshot.sh post-migration snapshots/post_migration.txt
        env:
          NEO4J_URL: ${{ env.NEO4J_URI }}
          NEO4J_USERNAME: ${{ env.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ env.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ env.NEO4J_DATABASE }}

      # ── Step 7: Export post-migration Cypher dump ─────
      - name: Export post-migration Cypher dump
        if: always()
        run: |
          bash scripts/export_cypher_dump.sh dumps/post_migration_dump.cypher
        env:
          NEO4J_URL: ${{ env.NEO4J_URI }}
          NEO4J_USERNAME: ${{ env.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ env.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ env.NEO4J_DATABASE }}

      # ── Step 8: Generate audit report ─────────────────
      - name: Generate migration report
        if: always()
        run: |
          bash scripts/generate_report.sh
        env:
          NEO4J_URL: ${{ env.NEO4J_URI }}
          NEO4J_USERNAME: ${{ env.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ env.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ env.NEO4J_DATABASE }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          ROLLBACK_TO: ""
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
          RUN_ID: ${{ github.run_id }}
          TRIGGERED_BY: ${{ github.actor }}

      # ── Step 9: Print report to job log ───────────────
      - name: Print report summary
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "        MIGRATION REPORT SUMMARY"
          echo "════════════════════════════════════════"
          cat reports/migration_report_*.txt 2>/dev/null || echo "No report found"

      # ── Step 10: Upload all artifacts (90 days) ───────
      - name: Upload migration report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: migration-report-${{ github.run_id }}
          path: reports/
          retention-days: 90

      - name: Upload baseline dump zip
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dump-baseline-${{ github.run_id }}
          path: dumps/recommendations-50.zip
          retention-days: 90

      - name: Upload post-migration Cypher dump
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dump-post-migration-${{ github.run_id }}
          path: dumps/post_migration_dump.cypher
          retention-days: 90

      - name: Upload snapshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: db-snapshots-${{ github.run_id }}
          path: snapshots/
          retention-days: 90

      - name: Upload migration logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: migration-logs-${{ github.run_id }}
          path: |
            migration_output.log
            migration_status.log
          retention-days: 90

      # ── Step 11: Fail if migration failed ─────────────
      - name: Fail job if migration failed
        if: steps.run_migrations.outputs.exit_code != '0'
        run: |
          echo "Migration failed with exit code ${{ steps.run_migrations.outputs.exit_code }}"
          exit 1